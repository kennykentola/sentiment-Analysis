version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    env_file:
      - .env
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    volumes:
      - ./app:/code/app
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info

  celery_beat:
    build: .
    volumes:
      - ./app:/code/app
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info
