services:
  - type: web
    name: sentiment-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m uvicorn app.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: APPWRITE_ENDPOINT
        sync: false
      - key: APPWRITE_PROJECT_ID
        sync: false
      - key: APPWRITE_API_KEY
        sync: false
      - key: APPWRITE_DB_ID
        sync: false
      - key: REDIS_URL
        sync: false
    autoDeploy: false
